<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2AM Admin Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .badge.pending { background: #b8860b; color: #fff; }
        .badge.approved { background: #006400; color: #fff;}
        .badge.rejected { background: #8b0000; color: #fff; }
        .badge.featured { background: #4b0082; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; color: var(--text-primary); }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--glass-border); }
        th { background: rgba(0,0,0,0.3); font-family: "Outfit", sans-serif; }
        
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .action-btn { 
            padding: 0.4rem 0.8rem; border-radius: 4px; border: none; cursor: pointer; 
            font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; 
        }
        .action-approve { background: rgba(0, 200, 0, 0.2); color: #8f8; border: 1px solid rgba(0,200,0,0.4); }
        .action-reject { background: rgba(200, 0, 0, 0.2); color: #f88; border: 1px solid rgba(200,0,0,0.4); }
        .action-feature { background: rgba(100, 0, 255, 0.2); color: #b8f; border: 1px solid rgba(100,0,255,0.4); }
        .action-delete { background: rgba(255, 0, 0, 0.4); color: #fff; border: 1px solid rgba(255,0,0,0.6); }
        
        .action-btn:hover { filter: brightness(1.5); box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    </style>
</head>
<body class="theme-late-night">

    <div class="background-animation"></div>

    <div id="login-screen" class="container" style="max-width: 500px; margin-top: 10vh;">
        <div class="glass-card" style="text-align: center;">
            <h2 class="step-title">Admin Access</h2>
            <input type="password" id="admin-pass" class="glass-input" placeholder="Enter password (hint: 2am)" style="width: 100%; margin-bottom: 1.5rem; text-align: center;">
            <button class="submit-button" onclick="login()" style="margin-top: 0;">Enter Dashboard</button>
            <div id="login-error" class="error-text"></div>
        </div>
    </div>

    <div id="dashboard" class="container hidden" style="max-width: 1000px;">
        <div class="glass-card" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem;">
            <h1 class="hero-title" style="margin-bottom: 0; font-size: 2.5rem; background: linear-gradient(180deg, #ffffff 0%, var(--theme-color) 150%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Dashboard</h1>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="index.html" class="share-btn" style="text-decoration: none;">Back to site</a>
                <button class="action-btn action-reject" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="glass-card" style="margin-bottom: 2rem;">
            <h3 class="step-title" style="text-align: left; font-size: 1.2rem; margin-bottom: 1rem;">Banned Keywords</h3>
            <div id="keywords-list" style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;"></div>
            <div style="display: flex; gap: 1rem;">
                <input type="text" id="new-keyword" class="glass-input" placeholder="Add new banned word" style="padding: 0.6rem 1rem;">
                <button class="action-btn action-approve" onclick="addKeyword()" style="padding: 0 1.5rem;">Add</button>
            </div>
        </div>

        <div class="glass-card" style="padding: 1.5rem 2rem;">
            <h3 class="step-title" style="text-align: left; font-size: 1.2rem; margin-bottom: 1rem;">Confessions</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Confession</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://fwjfquiklvcveflqdken.supabase.co/rest/v1';
        const SUPA_KEY = 'sb_publishable_Ox2fe4PkcBGqevWX91vqeA_Xxsc8O2V';
        
        let confessions = [];
        let bannedKeywords = JSON.parse(localStorage.getItem('bannedKeywords')) || ['spam', 'abuse', 'hate'];
        let refreshInterval;

        const passInput = document.getElementById('admin-pass');
        passInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        window.login = function() {
            const pass = passInput.value;
            if (pass === '2am') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                initDashboard();
            } else {
                document.getElementById('login-error').textContent = 'Incorrect password';
                setTimeout(() => document.getElementById('login-error').textContent = '', 3000);
            }
        };

        window.logout = function() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            passInput.value = '';
            
            clearInterval(refreshInterval);
            window.removeEventListener('storage', syncData);
        };
        
        function initDashboard() {
            loadData();
            renderKeywords();
            
            // Auto Update Support
            window.addEventListener('storage', syncData);
            
            // Auto refresh from database every 10 seconds
            refreshInterval = setInterval(loadData, 10000);
            
            // Refresh "time ago" every minute
            setInterval(renderAdmin, 60000);
        }
        
        function syncData(e) {
            if (e.key === 'bannedKeywords') {
                bannedKeywords = JSON.parse(localStorage.getItem('bannedKeywords')) || ['spam', 'abuse', 'hate'];
                renderKeywords();
            }
        }
        
        async function loadData() {
            try {
                const res = await fetch(`${SUPA_URL}/confessions?select=*&order=timestamp.desc`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                if (res.ok) {
                    confessions = await res.json();
                    renderAdmin();
                }
            } catch(e) {
                console.error("Failed to fetch confessions", e);
            }
        }

        function renderAdmin() {
            const tbody = document.getElementById('admin-table-body');
            if (confessions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 2rem;">No confessions yet.</td></tr>';
                return;
            }
            
            tbody.innerHTML = confessions.map(c => {
                const safeTimestamp = c.timestamp || new Date().toISOString();
                const d = new Date(safeTimestamp);
                const safeStatus = c.status || 'approved';
                const safeText = c.text || '';
                const timeAgoStr = Number.isNaN(d.getTime()) ? 'unknown' : (Math.floor((new Date() - d)/1000) < 60 ? 'now' : timeAgo(safeTimestamp));
                const dateStr = Number.isNaN(d.getTime()) ? 'unknown' : d.toLocaleString();

                return `
                <tr>
                    <td style="white-space: nowrap; font-size: 0.8rem; color: var(--text-secondary);">
                        <div title="${dateStr}">${timeAgoStr}</div>
                    </td>
                    <td style="max-width: 400px; word-wrap: break-word; line-height: 1.4;">${escapeHTML(safeText)}</td>
                    <td>
                        <div style="display: flex; flex-direction: column; gap: 0.3rem; align-items: flex-start;">
                            <span class="badge ${safeStatus}">${safeStatus}</span>
                            ${c.featured ? '<span class="badge featured">featured</span>' : ''}
                        </div>
                    </td>
                    <td class="actions">
                        ${safeStatus !== 'approved' ? `<button class="action-btn action-approve" onclick="updateStatus('${c.id}', 'approved')">Approve</button>` : ''}
                        ${safeStatus !== 'rejected' && safeStatus === 'approved' ? `<button class="action-btn action-reject" onclick="updateStatus('${c.id}', 'rejected')">Reject</button>` : ''}
                        ${safeStatus === 'approved' ? `<button class="action-btn action-feature" onclick="toggleFeature('${c.id}')">${c.featured ? 'Unfeature' : 'Feature'}</button>` : ''}
                        <button class="action-btn action-delete" onclick="deleteConfession('${c.id}')">Delete</button>
                    </td>
                </tr>
            `}).join('');
        }

        function renderKeywords() {
            const list = document.getElementById('keywords-list');
            if (bannedKeywords.length === 0) {
                list.innerHTML = '<span style="color: var(--text-secondary); font-size: 0.9rem;">No banned keywords.</span>';
                return;
            }
            
            list.innerHTML = bannedKeywords.map(w => `
                <span style="background:rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding:0.4rem 0.8rem; border-radius:15px; font-size:0.9rem; display:flex; align-items:center; gap:0.5rem; color: var(--text-primary);">
                    ${escapeHTML(w)}
                    <button style="padding:0; background:none; color:#ff6b6b; border:none; cursor:pointer; font-size: 1.2rem; line-height: 1;" onclick="removeKeyword('${w.replace(/'/g, "\\'")}')">&times;</button>
                </span>
            `).join('');
        }

        window.addKeyword = function() {
            const val = document.getElementById('new-keyword').value.trim().toLowerCase();
            if (val && !bannedKeywords.includes(val)) {
                bannedKeywords.push(val);
                saveData();
                renderKeywords();
                document.getElementById('new-keyword').value = '';
            }
        };
        
        const keywordInput = document.getElementById('new-keyword');
        keywordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                addKeyword();
            }
        });

        window.removeKeyword = function(word) {
            bannedKeywords = bannedKeywords.filter(w => w !== word);
            saveData();
            renderKeywords();
        };

        window.updateStatus = async function(id, status) {
            const c = confessions.find(x => x.id === id);
            if (c) {
                const newStatus = status;
                const newFeatured = status !== 'approved' ? false : c.featured;
                
                c.status = newStatus;
                c.featured = newFeatured;
                renderAdmin();

                try {
                    await fetch(`${SUPA_URL}/confessions?id=eq.${id}`, {
                        method: "PATCH",
                        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ status: newStatus, featured: newFeatured })
                    });
                } catch(e) { console.error(e); }
            }
        };

        window.toggleFeature = async function(id) {
            const c = confessions.find(x => x.id === id);
            if (c) {
                if (!c.featured && c.status !== 'approved') {
                    c.status = 'approved';
                }
                
                let patches = [];
                // If we are featuring this, unfeature everything else locally and remotely
                if (!c.featured) {
                    confessions.forEach(x => {
                        if (x.featured && x.id !== id) {
                            x.featured = false;
                            patches.push(
                                fetch(`${SUPA_URL}/confessions?id=eq.${x.id}`, {
                                    method: "PATCH",
                                    headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" },
                                    body: JSON.stringify({ featured: false })
                                })
                            );
                        }
                    });
                }
                
                c.featured = !c.featured;
                renderAdmin();
                
                patches.push(
                    fetch(`${SUPA_URL}/confessions?id=eq.${id}`, {
                        method: "PATCH",
                        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ status: c.status, featured: c.featured })
                    })
                );
                
                try { await Promise.all(patches); } catch(e) { console.error(e); }
            }
        };

        window.deleteConfession = async function(id) {
            if (confirm('Are you sure you want to delete this confession?')) {
                confessions = confessions.filter(x => x.id !== id);
                renderAdmin();
                
                try {
                    await fetch(`${SUPA_URL}/confessions?id=eq.${id}`, {
                        method: "DELETE",
                        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
                    });
                } catch(e) { console.error(e); }
            }
        };

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function saveData() {
            localStorage.setItem('bannedKeywords', JSON.stringify(bannedKeywords));
        }
        
        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return `${seconds} seconds ago`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} minutes ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} hours ago`;
            const days = Math.floor(hours / 24);
            return `${days} days ago`;
        }
    </script>
</body>
</html>
